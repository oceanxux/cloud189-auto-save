name: Auto Release Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Guard release conditions
        id: guard
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          should_publish=true
          reason="ready"

          if [ "$ACTOR" = "github-actions[bot]" ]; then
            should_publish=false
            reason="skip bot trigger"
          elif printf '%s' "$HEAD_COMMIT_MESSAGE" | grep -Fq '[skip release]'; then
            should_publish=false
            reason="skip release commit"
          fi

          if [ "$should_publish" = true ] && [ "$EVENT_NAME" = "push" ]; then
            git fetch origin master --tags
            latest_sha=$(git rev-parse origin/master)
            if [ "$latest_sha" != "$CURRENT_SHA" ]; then
              should_publish=false
              reason="outdated commit"
            fi
          fi

          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Skip release
        if: steps.guard.outputs.should_publish != 'true'
        run: |
          echo "Skipping auto release: ${{ steps.guard.outputs.reason }}"

      - name: Set up Node.js
        if: steps.guard.outputs.should_publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Bump patch version
        if: steps.guard.outputs.should_publish == 'true'
        id: version
        run: |
          npm version patch --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit version and push tag
        if: steps.guard.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${TAG} [skip release]"
          git tag "${TAG}"
          git push origin HEAD:master
          git push origin "${TAG}"

      - name: Set up QEMU
        if: steps.guard.outputs.should_publish == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.guard.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        if: steps.guard.outputs.should_publish == 'true'
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: steps.guard.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        if: steps.guard.outputs.should_publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.prep.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.prep.outputs.image }}:latest

      - name: Create GitHub Release
        if: steps.guard.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
